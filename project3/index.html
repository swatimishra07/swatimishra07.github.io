	function createNetwork(Inputs,Outputs,HiddenLayers,NeuronsPerLayer,Alpha,Threshold,def)	
	{ 	// class of a neuron
		var Neuron = function (inputs)
					{
						this.numOfInputs = inputs;
						this.delta=0; 		// default value
						this.activation =0; 	// default value
						this.value =0; 		//defualt value
						this.weights=[];
						for(var i=0;i<(inputs +1);i++)
						{
							this.weights[i]=10*((Math.random())*2 -1);
						}
						console.log ("neuron created")
					};
		Neuron.prototype.getWeights = function (num)
		{
			return this.weights[num];
		};
		
		Neuron.prototype.updateWeight = function (pos,update)
		{
			return (this.weights[pos] +=update);
		};
		Neuron.prototype.getActivation =  function()
		{
			return this.activation;
		};
		
		Neuron.prototype.setActivation =  function(val)
		{
			this.activation = val;
		};
		
		Neuron.prototype.getValue = function ()
		{
			return this.value;
		};
		
		Neuron.prototype.setValue = function (val)
		{
			this.value = val;
		};
		
		Neuron.prototype.getDelta = function ()
		{
			return this.delta;
		};
		
		Neuron.prototype.setDelta = function (val)
		{
			 this.delta = val;
		}
		
		//class of a layer having multiple neurons
		
		var Layer = function (neuronCount,inputsPerNeuron)
		{
			this.numNeurons = neuronCount;
			this.neurons = [];
			for(var i=0;i<neuronCount;i++)
			{
				this.neurons.push(new Neuron(inputsPerNeuron));
			}		
			console.log("layer created");		
		};
		
		Layer.prototype.getNeuronCount = function ()
		{
			return this.numNeurons;
		};
		
		Layer.prototype.getNeuron = function (num)
		{
			return this.neurons[num];
		};
		
		// class of neural network
		
		var NeuralNet = function (inputs,
								  outputs,
								  hiddenLayers,
								  neuronsPerLayer,
								  alpha,
								  threshold
								 )
		{
			this.numInputs = inputs;
			this.numOutputs = outputs;
			this.numHiddenLayers = hiddenLayers;
			this.numNeuronsPerLayer = neuronsPerLayer;
			this.learningRate = alpha;
			this.responseThreshold = threshold;
			this.layers = [];
			this.layers.push(new Layer(inputs,0));//first layer - input image
			this.layers.push(new Layer(neuronsPerLayer,inputs)); // second layer 
			for (var j=0; j <hiddenLayers-1;j++) // hidden layers
			{
				this.layers.push(new Layer(neuronsPerLayer,neuronsPerLayer));
			}
			this.layers.push(new Layer(outputs,neuronsPerLayer));
			this.OutputLayer = [];
			
			//console.log("Network Created");
			
		};
		
		NeuralNet.prototype.sigmoid = function (val)
		{
			var div = -(val/this.responseThreshold);
			var denom = 1+ Math.exp(div);
			return (1/denom);
		}
		
		NeuralNet.prototype.sigmoidPrime = function (val)
		{
			var num = Math.exp(val/this.responseThreshold);
			var denom = (this.responseThreshold)*(Math.pow(num+1,2));
			
			return (num/denom);
		}
		NeuralNet.prototype.feedForward = function (inputs,Out)
		{
			for(var i=0;i<this.layers[0].getNeuronCount();i++)
			{
				this.layers[0].getNeuron(i).setValue(inputs[i]);
			}
			
			var layerLength = this.layers.length;
			for(var l=1;l<layerLength;l++)
			{
				var currNeuronCount = this.layers[l].getNeuronCount();
				for(var j=0;j<currNeuronCount;j++)
				{
					var sum=0;
					var UpStreamNeuCnt = this.layers[l-1].getNeuronCount(); 
					for(var i=0;i<UpStreamNeuCnt;i++)
					{
						var Weight = this.layers[l].getNeuron(j).getWeights(i);
						var Value = this.layers[l-1].getNeuron(i).getValue();
						
						sum += (Weight*Value);
					}
					
					var SigmoidVal = this.sigmoid(sum);
					
					this.layers[l].getNeuron(j).setActivation(sum);
					this.layers[l].getNeuron(j).setValue(SigmoidVal);
					
				}
			}
			
			var lastNeurCnt = this.layers[layerLength-1].getNeuronCount();
			console.log(lastNeurCnt);
			for(var k=0;k<lastNeurCnt;k++)
			{
				Out.push(this.layers[layerLength-1].getNeuron(k).getValue());

			}

		}
		
		NeuralNet.prototype.BackPropagate =  function (Out,teacher)
		{
			var numHiddenLayer =  this.numHiddenLayers;
			var LLNeuronCnt = Out.length; 
			console.log(LLNeuronCnt);
			for(var i=0;i<LLNeuronCnt;i++)
			{
				var AdVal = this.layers[numHiddenLayer+1].getNeuron(i).getValue();
				var adjusted = -AdVal;
				if(i==teacher)
				{
					adjusted +=1;
				}
				var activate = this.layers[numHiddenLayer+1].getNeuron(i).getActivation();
				var DeltaVal = this.sigmoidPrime(activate*adjusted);
				this.layers[numHiddenLayer+1].getNeuron(i).setDelta(DeltaVal);
				
			}
			for(var l=numHiddenLayer;l>=0;l--)
			{
				var CurrLayerNCnt= this.layers[l].getNeuronCount();
				var  DownStreamNCnt = this.layers[l+1].getNeuronCount();
				
				for(var i=0;j<CurrLayerNCnt;i++)
				{
					var sum=0;
					for(j=0;j<DownStreamNCnt;j++)
					{
						var weightCur = this.layers[l+1].getNeuron(j).getWeights(i);
						var DeltaCur =  this.layers[l+1].getNeuron(j).getDelta();
						sum += weightCur*DeltaCur;
					}
					var activate = this.layers[l].getNeuron(i).getActivation();
					var SigmoidVal = this.sigmoidPrime(activate);
					this.layers[l].getNeuron(i).setDelta(SigmoidVal*sum);
					for(var j=0;j<DownStreamNCnt;j++)
					{
						var DeltaValue = this.layers[l+1].getNeuron(j).getDelta();
						var updated = DeltaValue*(this.sigmoid(activate))*(this.learningRate);
						
						this.layers[l+1].getNeuron(j).updateWeight(i,updated);
					}
				}
			
			}	
		
		}
		
		//var ne = new Neuron(3);
		//console.log(ne.weights);
		//console.log(ne.getWeights(3));
		//console.log(ne.updateWeight(3,2));
		//console.log(ne.getWeights(3));
		//ne.setValue(4);
		//console.log(ne.value);
		//var la = new Layer(2,3);
		//console.log(la);

		var In = [0,1]; // sample values
		var Out = [];
		network = new NeuralNet(Inputs,Outputs,HiddenLayers,NeuronsPerLayer,Alpha,Threshold);
		if(def==0)
		{
			delete network;
			network = new NeuralNet(Inputs,Outputs,HiddenLayers,NeuronsPerLayer,Alpha,Threshold);
			
			
		}
		
		//network = new NeuralNet(2,2,1,6,1,0.57); // for testing
		//network.feedForward(TrainingImages[0][0],Out);
		//console.log(network);
		//console.log(TrainingImages[0][0]);	
		
	}

	function DrawLastLayerFloLines(numHiddenLayer,numNeurons,output,NeuronNo,layerPositions)
	{	
		var flowSVG = d3.select("#main").append('g');
		
		var flowMargin=40;
		var Stop=[];
		var Start=[];
		var flowOffset = 20;
		
		for(var j=0;j<numNeurons;j++)
		{
			for(var i=0;i<output;i++)
			{
				Stop.push({
							x: layerPositions[numHiddenLayer-1][i].x,
							y: layerPositions[numHiddenLayer-1][i].y
							
						  });
				Start.push({
							x: layerPositions[numHiddenLayer-2][j].x + flowMargin,
							y: layerPositions[numHiddenLayer-2][j].y + flowOffset
						   });
			}		
		}
		for(var k=0;k<output;k++)
		{
			flowSVG.append('path').attr('class', 'flowline')
					   .attr('d', 'M'+Start[NeuronNo*output].x+' '+Start[NeuronNo*output].y+' L'+Stop[k].x+' '+Stop[k].y);
			console.log();
		}
		
	}
	
	function DrawIndividualFlolines(LayerNum,numNeurons,output,NeuronNo,layerPositions)

		var flowMargin=40;

		var flowOffset = 20;
		
		for(var j=0;j<output;j++)
		{
			for(var i=0;i<numNeurons;i++)
			{
				Stop.push({
							x: layerPositions[LayerNum+1][i].x,
							y: layerPositions[LayerNum+1][i].y + flowOffset
							
						  });
				Start.push({
							x: layerPositions[LayerNum][j].x + flowMargin,
							y: layerPositions[LayerNum][j].y + flowOffset
						   });
			}		
		}
		for(var k=0;k<output;k++)
		{
			flowSVG.append('path').attr('class', 'flowline')
					   .attr('d', 'M'+Start[NeuronNo*output].x+' '+Start[NeuronNo*output].y+' L'+Stop[k].x+' '+Stop[k].y);
		}
	}
